name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
        env:
          # Stub envs so the build doesn't fail on validate-on-import.
          # The app never makes network calls during `next build`.
          DATABASE_URL: postgresql://stub:stub@localhost/stub
          ANTHROPIC_API_KEY: stub
          OPENAI_API_KEY: stub
          COS_INGEST_TOKEN: stubstubstubstubstub
